services:
  api:
    build: .
    ports:
      - "8000:8080"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_db

  streamlit:
    build: .
    command: streamlit run streamlit_app/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8080
    depends_on:
      - api
