name: RAG Evaluation Gate

on:
  pull_request:
    branches: [main]

jobs:
  eval-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RAG evaluation
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          deepeval test run tests/test_rag.py --verbose

      - name: Check hallucination threshold
        run: python scripts/check_eval_threshold.py

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evaluation/eval_results.csv

  deploy:
    needs: eval-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push to Artifact Registry
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/rag-app

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy rag-app \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/rag-app \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
